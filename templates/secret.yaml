{{- if .Values.global.createRegistrySecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.global.dockerRegistry.dockerSecretName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade,post-install,post-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ template "imagePullSecret" . }}
{{- end }}
---
{{- if .Values.global.createRegistrySecret }}
{{- if .Values.skateLicenseAgent.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.global.dockerRegistry.dockerSecretName }}
  namespace: {{ .Values.skateLicenseAgent.skateLicenseAgentFrontend.deployment.namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade,post-install,post-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ template "imagePullSecret" . }}
{{- end }}
{{- end }}